<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>God Mode - UHD Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-dark { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; width: 100%; outline: none; }
        .input-dark:focus { border-color: #3b82f6; }
        /* Custom Scrollbar for tables */
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="min-h-screen relative">

    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass p-8 rounded-3xl max-w-md w-full shadow-[0_0_50px_rgba(59,130,246,0.2)] border border-blue-500/30 text-center">
            <i class="fas fa-user-secret text-6xl text-blue-500 mb-6"></i>
            <h1 class="text-3xl font-black mb-2">Admin God Mode</h1>
            <p class="text-gray-400 text-sm mb-8">Enter your Master Key to access the panel.</p>
            
            <div class="space-y-4">
                <input type="text" id="workerUrl" class="input-dark text-sm" placeholder="Worker URL (e.g., https://your-worker.workers.dev)" value="https://uhdhosting.uhdnetwork.workers.dev">
                <input type="password" id="adminKey" class="input-dark text-sm" placeholder="MASTER_ADMIN_KEY">
                <button onclick="loginAdmin()" id="loginBtn" class="w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition shadow-lg mt-2">Access Panel</button>
            </div>
            <p id="loginError" class="text-red-400 text-sm mt-4 hidden"></p>
        </div>
    </div>

    <div id="dashboardScreen" class="hidden min-h-screen flex flex-col">
        <nav class="glass border-b border-gray-800 p-4 sticky top-0 z-50 flex justify-between items-center px-6">
            <div class="flex items-center gap-3">
                <i class="fas fa-crown text-2xl text-yellow-400"></i>
                <h1 class="text-xl font-bold text-white tracking-widest uppercase">UHD Control Panel</h1>
            </div>
            <button onclick="logoutAdmin()" class="bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/50 px-4 py-2 rounded-lg font-bold transition text-sm">
                <i class="fas fa-sign-out-alt mr-2"></i> Lock Panel
            </button>
        </nav>

        <div class="p-6 max-w-7xl mx-auto w-full space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass p-6 rounded-2xl border border-gray-700 flex items-center justify-between">
                    <div><p class="text-gray-400 text-sm font-bold uppercase">Total Users</p><h2 class="text-3xl font-black text-white mt-1" id="statUsers">0</h2></div>
                    <i class="fas fa-users text-4xl text-blue-500 opacity-50"></i>
                </div>
                <div class="glass p-6 rounded-2xl border border-gray-700 flex items-center justify-between">
                    <div><p class="text-gray-400 text-sm font-bold uppercase">Active Files</p><h2 class="text-3xl font-black text-white mt-1" id="statFiles">0</h2></div>
                    <i class="fas fa-box-open text-4xl text-green-500 opacity-50"></i>
                </div>
                <div class="glass p-6 rounded-2xl border border-gray-700 flex items-center justify-between cursor-pointer hover:border-blue-500 transition" onclick="loadUsers()">
                    <div><p class="text-blue-400 text-sm font-bold uppercase">System Status</p><h2 class="text-xl font-bold text-white mt-2 flex items-center"><span class="w-3 h-3 bg-green-500 rounded-full mr-2 animate-pulse"></span> Online (Refresh)</h2></div>
                    <i class="fas fa-sync-alt text-4xl text-gray-600"></i>
                </div>
            </div>

            <div class="glass rounded-2xl border border-gray-700 overflow-hidden">
                <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-800/50">
                    <h2 class="text-lg font-bold"><i class="fas fa-database mr-2 text-blue-400"></i> User Database</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="bg-gray-900/80 text-gray-400">
                            <tr>
                                <th class="p-4 font-bold">User / Email</th>
                                <th class="p-4 font-bold">Plan</th>
                                <th class="p-4 font-bold">Method</th>
                                <th class="p-4 font-bold">Files</th>
                                <th class="p-4 font-bold">Status</th>
                                <th class="p-4 font-bold text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody" class="divide-y divide-gray-800">
                            <tr><td colspan="6" class="p-8 text-center text-gray-500"><i class="fas fa-spinner fa-spin text-2xl mb-2"></i><br>Loading Data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let WORKER_URL = "";
        let ADMIN_KEY = "";

        // Check if already logged in locally
        window.onload = () => {
            const savedKey = localStorage.getItem('uhd_admin_key');
            const savedUrl = localStorage.getItem('uhd_admin_url');
            if(savedKey && savedUrl) {
                WORKER_URL = savedUrl;
                ADMIN_KEY = savedKey;
                document.getElementById('workerUrl').value = savedUrl;
                document.getElementById('adminKey').value = savedKey;
                showDashboard();
            }
        };

        async function loginAdmin() {
            const urlInput = document.getElementById('workerUrl').value.replace(/\/$/, "");
            const keyInput = document.getElementById('adminKey').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('loginError');

            if(!urlInput || !keyInput) { err.innerText = "Fill all fields!"; err.classList.remove('hidden'); return; }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
            btn.disabled = true;

            try {
                // Test the connection
                const res = await fetch(urlInput + '/api/v1/admin/users', {
                    headers: { 'x-admin-key': keyInput }
                });

                if(res.ok) {
                    WORKER_URL = urlInput;
                    ADMIN_KEY = keyInput;
                    localStorage.setItem('uhd_admin_key', keyInput);
                    localStorage.setItem('uhd_admin_url', urlInput);
                    err.classList.add('hidden');
                    showDashboard();
                } else {
                    err.innerText = "❌ Authentication Failed! Wrong Master Key.";
                    err.classList.remove('hidden');
                }
            } catch(e) {
                err.innerText = "❌ Network Error! Is the Worker URL correct?";
                err.classList.remove('hidden');
            }
            btn.innerHTML = 'Access Panel'; btn.disabled = false;
        }

        function logoutAdmin() {
            localStorage.removeItem('uhd_admin_key');
            location.reload();
        }

        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            loadUsers();
        }

        async function loadUsers() {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-gray-500"><i class="fas fa-spinner fa-spin text-2xl mb-2"></i><br>Fetching latest database...</td></tr>';
            
            try {
                const res = await fetch(WORKER_URL + '/api/v1/admin/users', { headers: { 'x-admin-key': ADMIN_KEY } });
                const users = await res.json();
                
                let totalFiles = 0;
                let html = '';
                
                users.forEach(u => {
                    totalFiles += (u.fileCount || 0);
                    const isBanned = u.banned === true;
                    const statusBadge = isBanned 
                        ? '<span class="bg-red-500/20 text-red-400 border border-red-500/50 px-2 py-1 rounded text-xs font-bold uppercase"><i class="fas fa-ban mr-1"></i> Banned</span>'
                        : '<span class="bg-green-500/20 text-green-400 border border-green-500/50 px-2 py-1 rounded text-xs font-bold uppercase"><i class="fas fa-check mr-1"></i> Active</span>';
                    
                    const banAction = isBanned 
                        ? `<button onclick="actionUser('${u.email}', 'unban')" class="bg-green-600/20 text-green-400 hover:bg-green-600 px-3 py-1.5 rounded-lg transition font-bold text-xs"><i class="fas fa-unlock mr-1"></i> Unban</button>`
                        : `<button onclick="actionUser('${u.email}', 'ban')" class="bg-red-600/20 text-red-400 hover:bg-red-600 hover:text-white px-3 py-1.5 rounded-lg transition font-bold text-xs"><i class="fas fa-gavel mr-1"></i> Ban</button>`;

                    const methodIcon = u.provider === 'google' ? '<i class="fab fa-google text-red-400"></i>' : (u.provider === 'github' ? '<i class="fab fa-github text-gray-300"></i>' : (u.provider === 'telegram' ? '<i class="fab fa-telegram text-blue-400"></i>' : '<i class="fas fa-envelope text-gray-400"></i>'));

                    html += `
                    <tr class="hover:bg-gray-800/50 transition">
                        <td class="p-4 flex items-center gap-3">
                            <img src="${u.avatar || 'https://via.placeholder.com/40'}" class="w-8 h-8 rounded-full bg-gray-800">
                            <div><p class="font-bold text-gray-200">${u.email}</p><code class="text-[10px] text-gray-500 bg-gray-900 px-1 rounded block mt-1" title="API Key">${u.apiKey}</code></div>
                        </td>
                        <td class="p-4"><span class="bg-yellow-500/10 text-yellow-400 border border-yellow-500/20 px-2 py-1 rounded uppercase text-[10px] font-bold">${u.plan}</span></td>
                        <td class="p-4 text-gray-400">${methodIcon} <span class="capitalize ml-1 text-xs">${u.provider || 'email'}</span></td>
                        <td class="p-4 font-mono text-blue-400 font-bold">${u.fileCount || 0}</td>
                        <td class="p-4">${statusBadge}</td>
                        <td class="p-4 text-right">
                            ${banAction}
                        </td>
                    </tr>`;
                });

                tbody.innerHTML = html || '<tr><td colspan="6" class="p-8 text-center text-gray-500">No users found.</td></tr>';
                document.getElementById('statUsers').innerText = users.length;
                document.getElementById('statFiles').innerText = totalFiles;
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-red-400 font-bold"><i class="fas fa-exclamation-triangle mr-2"></i> Failed to connect to API. Check Cloudflare Worker.</td></tr>';
            }
        }

        async function actionUser(email, action) {
            if(!confirm(`Are you sure you want to ${action} ${email}?`)) return;
            
            try {
                const res = await fetch(WORKER_URL + '/api/v1/admin/user/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
                    body: JSON.stringify({ email: email, action: action })
                });
                if(res.ok) { loadUsers(); } 
                else { alert("Failed to execute action."); }
            } catch(e) { alert("Network error!"); }
        }
    </script>
</body>
</html>
