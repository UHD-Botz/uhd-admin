<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>God Mode - UHD Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-dark { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; width: 100%; outline: none; }
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen relative">

    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass p-8 rounded-3xl max-w-md w-full shadow-[0_0_50px_rgba(59,130,246,0.2)] border border-blue-500/30 text-center">
            <i class="fas fa-user-secret text-6xl text-blue-500 mb-6"></i>
            <h1 class="text-3xl font-black mb-2">Admin God Mode</h1>
            <p class="text-gray-400 text-sm mb-8">Enter your Master Key to access the panel.</p>
            
            <div class="space-y-4">
                <input type="text" id="workerUrl" class="input-dark text-sm" placeholder="Worker URL (e.g., https://uhd.workers.dev)">
                <input type="password" id="adminKey" class="input-dark text-sm" placeholder="MASTER_ADMIN_KEY">
                <button onclick="loginAdmin()" id="loginBtn" class="w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition shadow-lg mt-2">Access Panel</button>
            </div>
            <p id="loginError" class="text-red-400 text-sm mt-4 hidden"></p>
        </div>
    </div>

    <div id="dashboardScreen" class="hidden min-h-screen flex flex-col">
        <nav class="glass border-b border-gray-800 p-4 sticky top-0 z-50 flex justify-between items-center px-6">
            <div class="flex items-center gap-3">
                <i class="fas fa-crown text-2xl text-yellow-400 animate-pulse"></i>
                <h1 class="text-xl font-bold text-white uppercase tracking-widest">UHD Core Command</h1>
            </div>
            <button onclick="logoutAdmin()" class="bg-red-500/10 hover:bg-red-500 border border-red-500/50 hover:text-white text-red-400 px-4 py-2 rounded-lg font-bold transition text-sm">
                <i class="fas fa-lock mr-2"></i> Lock Panel
            </button>
        </nav>

        <div class="p-6 max-w-7xl mx-auto w-full space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass p-6 rounded-2xl border border-gray-700 flex items-center justify-between">
                    <div><p class="text-gray-400 text-sm font-bold uppercase">Total Users</p><h2 class="text-4xl font-black text-white mt-1" id="statUsers">0</h2></div>
                    <i class="fas fa-users text-5xl text-blue-500 opacity-50"></i>
                </div>
                <div class="glass p-6 rounded-2xl border border-green-500/30 flex items-center justify-between shadow-[0_0_20px_rgba(34,197,94,0.1)] cursor-pointer hover:bg-gray-800 transition" onclick="loadUsers()">
                    <div><p class="text-green-400 text-sm font-bold uppercase">System Status</p><h2 class="text-2xl font-bold text-white mt-2 flex items-center"><span class="w-3 h-3 bg-green-500 rounded-full mr-2 animate-pulse"></span> ALL SYSTEMS NOMINAL</h2></div>
                    <i class="fas fa-sync-alt text-4xl text-gray-400 hover:rotate-180 transition duration-500"></i>
                </div>
            </div>

            <div class="glass rounded-2xl border border-gray-700 overflow-hidden">
                <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-800/50">
                    <h2 class="text-lg font-bold"><i class="fas fa-server mr-2 text-blue-400"></i> Global User Database</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="bg-gray-900/80 text-gray-400 border-b border-gray-700">
                            <tr>
                                <th class="p-4 font-bold">User / Secret Key</th>
                                <th class="p-4 font-bold">Plan</th>
                                <th class="p-4 font-bold">Method</th>
                                <th class="p-4 font-bold">Status</th>
                                <th class="p-4 font-bold text-right">God Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody" class="divide-y divide-gray-800">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="filesModal" class="hidden fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="glass rounded-3xl p-6 w-full max-w-4xl max-h-[85vh] flex flex-col border border-gray-600 shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b border-gray-700 pb-4">
                <h2 class="text-xl font-bold" id="modalTitle">User Files</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white text-2xl"><i class="fas fa-times"></i></button>
            </div>
            <div class="overflow-y-auto flex-1 pr-2" id="modalContent">
                </div>
        </div>
    </div>

    <script>
        let WORKER_URL = "";
        let ADMIN_KEY = "";

        window.onload = () => {
            const savedKey = localStorage.getItem('uhd_admin_key');
            const savedUrl = localStorage.getItem('uhd_admin_url');
            if(savedKey && savedUrl) {
                WORKER_URL = savedUrl; ADMIN_KEY = savedKey;
                document.getElementById('workerUrl').value = savedUrl;
                document.getElementById('adminKey').value = savedKey;
                showDashboard();
            }
        };

        async function loginAdmin() {
            const urlInput = document.getElementById('workerUrl').value.replace(/\/$/, "");
            const keyInput = document.getElementById('adminKey').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('loginError');

            if(!urlInput || !keyInput) { err.innerText = "Fill all fields!"; err.classList.remove('hidden'); return; }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...'; btn.disabled = true;
            try {
                const res = await fetch(urlInput + '/api/v1/admin/users', { headers: { 'x-admin-key': keyInput } });
                if(res.ok) {
                    WORKER_URL = urlInput; ADMIN_KEY = keyInput;
                    localStorage.setItem('uhd_admin_key', keyInput); localStorage.setItem('uhd_admin_url', urlInput);
                    err.classList.add('hidden'); showDashboard();
                } else { err.innerText = "❌ Wrong Master Key!"; err.classList.remove('hidden'); }
            } catch(e) { err.innerText = "❌ Network Error! CORS or Wrong URL."; err.classList.remove('hidden'); }
            btn.innerHTML = 'Access Panel'; btn.disabled = false;
        }

        function logoutAdmin() { localStorage.removeItem('uhd_admin_key'); location.reload(); }

        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            loadUsers();
        }

        async function loadUsers() {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '<tr><td colspan="5" class="p-8 text-center"><i class="fas fa-circle-notch fa-spin text-3xl text-blue-500"></i></td></tr>';
            try {
                const res = await fetch(WORKER_URL + '/api/v1/admin/users', { headers: { 'x-admin-key': ADMIN_KEY } });
                const users = await res.json();
                let html = '';
                
                users.forEach(u => {
                    const isBanned = u.banned === true;
                    const statusBadge = isBanned 
                        ? '<span class="bg-red-500/20 text-red-400 px-2 py-1 rounded text-xs font-bold uppercase"><i class="fas fa-ban"></i> Banned</span>'
                        : '<span class="bg-green-500/20 text-green-400 px-2 py-1 rounded text-xs font-bold uppercase"><i class="fas fa-check"></i> Active</span>';
                    
                    const banBtn = isBanned 
                        ? `<button onclick="actionUser('${u.email}', 'unban')" class="bg-green-600/20 text-green-400 hover:bg-green-600 hover:text-white px-3 py-1.5 rounded transition text-xs font-bold" title="Unban"><i class="fas fa-unlock"></i></button>`
                        : `<button onclick="actionUser('${u.email}', 'ban')" class="bg-orange-600/20 text-orange-400 hover:bg-orange-600 hover:text-white px-3 py-1.5 rounded transition text-xs font-bold" title="Ban"><i class="fas fa-gavel"></i></button>`;

                    const methodIcon = u.provider === 'google' ? '<i class="fab fa-google text-red-400"></i>' : (u.provider === 'github' ? '<i class="fab fa-github text-gray-300"></i>' : (u.provider === 'telegram' ? '<i class="fab fa-telegram text-blue-400"></i>' : '<i class="fas fa-envelope text-gray-400"></i>'));

                    html += `
                    <tr class="hover:bg-gray-800/30 transition">
                        <td class="p-4 flex items-center gap-3">
                            <img src="${u.avatar || 'https://via.placeholder.com/40'}" class="w-10 h-10 rounded-full border border-gray-600 object-cover">
                            <div><p class="font-bold text-gray-200">${u.email}</p><code class="text-[10px] text-gray-500 bg-black px-1.5 py-0.5 rounded border border-gray-700 block mt-1">${u.apiKey}</code></div>
                        </td>
                        <td class="p-4"><span class="bg-yellow-500/10 text-yellow-400 border border-yellow-500/20 px-2 py-1 rounded uppercase text-[10px] font-bold">${u.plan}</span></td>
                        <td class="p-4">${methodIcon} <span class="capitalize ml-1 text-xs text-gray-400">${u.provider || 'email'}</span></td>
                        <td class="p-4">${statusBadge}</td>
                        <td class="p-4 text-right space-x-2">
                            <button onclick="viewFiles('${u.email}')" class="bg-blue-600/20 text-blue-400 hover:bg-blue-600 hover:text-white px-3 py-1.5 rounded transition text-xs font-bold shadow-md"><i class="fas fa-folder-open mr-1"></i> Files (${u.fileCount||0})</button>
                            ${banBtn}
                            <button onclick="actionUser('${u.email}', 'delete')" class="bg-red-600/20 text-red-400 hover:bg-red-600 hover:text-white px-3 py-1.5 rounded transition text-xs font-bold shadow-md" title="Annihilate User"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>`;
                });
                tbody.innerHTML = html || '<tr><td colspan="5" class="p-8 text-center text-gray-500">No users found.</td></tr>';
                document.getElementById('statUsers').innerText = users.length;
            } catch (err) { tbody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-red-400 font-bold"><i class="fas fa-exclamation-triangle mr-2"></i> Failed to connect.</td></tr>'; }
        }

        async function actionUser(email, action) {
            let msg = action === 'delete' ? `🚨 WARNING: Do you want to ANNIHILATE ${email}? All their data will be wiped!` : `Are you sure you want to ${action} ${email}?`;
            if(!confirm(msg)) return;
            try {
                const res = await fetch(WORKER_URL + '/api/v1/admin/user/action', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY }, body: JSON.stringify({ email, action }) });
                if(res.ok) { loadUsers(); } else { alert("Failed to execute action."); }
            } catch(e) { alert("Network error!"); }
        }

        async function viewFiles(email) {
            document.getElementById('modalTitle').innerHTML = `<i class="fas fa-folder-open text-yellow-400 mr-2"></i> Files for ${email}`;
            const c = document.getElementById('modalContent');
            c.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-3xl text-blue-500"></i></div>';
            document.getElementById('filesModal').classList.remove('hidden');

            try {
                const res = await fetch(WORKER_URL + '/api/v1/admin/user/files', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY }, body: JSON.stringify({ email }) });
                const files = await res.json();
                if(files.length === 0) { c.innerHTML = '<p class="text-center text-gray-500 py-10">This user has no files.</p>'; return; }
                
                let html = '<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">';
                files.reverse().forEach(f => {
                    html += `
                    <div class="bg-gray-900 border border-gray-700 p-4 rounded-xl flex items-center justify-between group">
                        <div class="overflow-hidden">
                            <h3 class="font-bold text-sm text-gray-200 truncate pr-2" title="${f.name || 'UHD_'+f.id}">${f.name || 'UHD_'+f.id}</h3>
                            <a href="${f.directUrl || WORKER_URL+'/stream/'+f.id}" target="_blank" class="text-[10px] text-blue-400 hover:underline">View File <i class="fas fa-external-link-alt ml-1"></i></a>
                        </div>
                        <button onclick="expireFile('${f.id}', '${email}')" class="bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white p-3 rounded-lg transition" title="Force Expire & Delete">
                            <i class="fas fa-fire"></i>
                        </button>
                    </div>`;
                });
                c.innerHTML = html + '</div>';
            } catch(e) { c.innerHTML = '<p class="text-red-400 text-center py-10">Error loading files.</p>'; }
        }

        async function expireFile(fileId, email) {
            if(!confirm(`🔥 Do you want to permanently DELETE and EXPIRE file [${fileId}]?`)) return;
            try {
                const res = await fetch(WORKER_URL + '/api/v1/admin/file/delete', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY }, body: JSON.stringify({ fileId, email }) });
                if(res.ok) { viewFiles(email); } else { alert("Failed to delete file."); }
            } catch(e) { alert("Network error!"); }
        }

        function closeModal() { document.getElementById('filesModal').classList.add('hidden'); }
    </script>
</body>
</html>
